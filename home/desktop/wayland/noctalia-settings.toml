[shell]
ui_scale = 1.0
corner_radius_scale = 1.0
font_family = "Sans Serif"
lang = "zh-CN"
telemetry_enabled = false
setup_wizard_enabled = false
password_style = "default"
settings_show_advanced = false
show_location = true
clipboard_enabled = true
clipboard_auto_paste = "off"
clipboard_image_action_command = ""
avatar_path = "/home/echoyn/.face"

[shell.animation]
enabled = true
speed = 1.0

[shell.shadow]
direction = "down_right"
alpha = 0.55

[shell.panel]
transparency_mode = "soft"
borders = false
shadow = true
launcher_placement = "centered"
clipboard_placement = "centered"
control_center_placement = "attached"
wallpaper_placement = "attached"
session_placement = "centered"
open_near_click_control_center = true
open_near_click_launcher = false
open_near_click_clipboard = false
open_near_click_wallpaper = false
open_near_click_session = false
launcher_categories = true
launcher_show_icons = true
launcher_compact = false

[shell.screen_corners]
enabled = false
size = 32

[shell.mpris]
blacklist = []

[wallpaper]
enabled = true
fill_mode = "crop"
fill_color = "#000000"
transition = ["fade", "disc"]
transition_duration = 1500
edge_smoothness = 0.05
transition_on_startup = true
directory = "/home/echoyn/Pictures/Wallpapers"
directory_light = ""
directory_dark = ""
per_monitor_directories = false

[wallpaper.automation]
enabled = true
interval_seconds = 600
order = "random"
recursive = true

[wallpaper.monitor."eDP-1"]
directory = "/home/echoyn/Pictures/Wallpapers"

[wallpaper.monitor."HDMI-A-1"]
directory = "/home/echoyn/Pictures/Wallpapers"

[theme]
mode = "light"
source = "wallpaper"
builtin = "Noctalia"
wallpaper_scheme = "m3-tonal-spot"

[theme.templates]
enable_builtin_templates = true
builtin_ids = []
enable_community_templates = true
community_ids = []

[backdrop]
enabled = false
blur_intensity = 0.4
tint_intensity = 0.6

[lockscreen]
blurred_desktop = false
blur_intensity = 0.0
tint_intensity = 0.0
wallpaper = ""

[notification]
enable_daemon = true
show_app_name = true
show_actions = true
position = "top_right"
layer = "overlay"
scale = 1.0
background_opacity = 1.0
offset_x = 20
offset_y = 8
monitors = []
collapse_on_dismiss = true
blacklist = []
blacklist_allow_critical = true
allowed_urgencies = []

[osd]
position = "top_right"
orientation = "horizontal"
scale = 1.0
background_opacity = 1.0
offset_x = 20
offset_y = 8
monitors = []

[osd.kinds]
volume = true
volume_output = true
volume_input = true
brightness = true
wifi = true
bluetooth = true
power_profile = true
caffeine = true
dnd = true
lock_keys = true
keyboard_layout = true

[system.monitor]
enabled = true
cpu_poll_seconds = 2.0
gpu_poll_seconds = 0.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0
disk_poll_seconds = 10.0
cpu_usage_activity_threshold = 80.0
cpu_usage_critical_threshold = 90.0
cpu_temp_activity_threshold = 80.0
cpu_temp_critical_threshold = 90.0
gpu_temp_activity_threshold = 80.0
gpu_temp_critical_threshold = 90.0
ram_pct_activity_threshold = 80.0
ram_pct_critical_threshold = 90.0
swap_pct_activity_threshold = 80.0
swap_pct_critical_threshold = 90.0
disk_pct_activity_threshold = 80.0
disk_pct_critical_threshold = 90.0

[weather]
enabled = true
refresh_minutes = 30
unit = "metric"
effects = true

[audio]
enable_overdrive = false
enable_sounds = false
sound_volume = 0.5
volume_change_sound = ""
notification_sound = ""

[brightness]
enable_ddcutil = false
ignore_mmids = []

[battery]
warning_threshold = 20

[nightlight]
enabled = false
force = false
temperature_day = 6500
temperature_night = 4000

[location]
auto_locate = false
address = "Shenzhen, China"
sunrise = "06:30"
sunset = "18:30"

[idle]
pre_action_fade_seconds = 5.0
behavior_order = ["lock", "screen-off", "suspend"]

[idle.behavior.lock]
enabled = true
timeout = 600
action = "lock"
command = "noctalia:session lock"
resume_command = ""

[idle.behavior.screen-off]
enabled = true
timeout = 660
action = "screen_off"
command = "noctalia:dpms-off"
resume_command = "noctalia:dpms-on"

[idle.behavior.suspend]
enabled = false
timeout = 0
action = "suspend"
command = ""
resume_command = ""

[keybinds]
validate = ["return", "kp_enter"]
cancel = ["escape"]
left = ["left"]
right = ["right"]
up = ["up"]
down = ["down"]

[bar.main]
position = "top"
enabled = true
auto_hide = false
reserve_space = true
layer = "top"
thickness = 34
background_opacity = 0.85
border = "outline"
border_width = 0.0
radius = 12
margin_ends = 8
margin_edge = 4
padding = 2
widget_spacing = 6
shadow = true
contact_shadow = false
panel_overlap = 1
scale = 1.0
font_weight = 500
capsule = true
capsule_fill = "surface_variant"
capsule_padding = 8.0
capsule_radius = 12.0
capsule_opacity = 1.0
capsule_border = ""
start = ["launcher", "clock", "active_window", "media"]
center = ["workspaces"]
end = ["tray", "notifications", "battery", "volume", "brightness", "control-center", "clipboard"]

[widget.launcher]
type = "launcher"
glyph = "rocket"

[widget.clock]
type = "clock"
format = "{:%H:%M %a, %b %d}"
vertical_format = "{:%H %M - %d %m}"
tooltip_format = "{:%H:%M %a, %b %d}"

[widget.active_window]
type = "active_window"
min_length = 0
max_length = 145
title_scroll = "on_hover"
display = "icon_and_text"

[widget.media]
type = "media"
min_length = 0
max_length = 145
art_size = 16.0
title_scroll = "on_hover"
hide_when_no_media = false

[widget.workspaces]
type = "workspaces"
minimal = false
display = "id"
labels_only_when_occupied = true
hide_when_empty = false
max_label_chars = 2
pill_scale = 0.6
focused_color = "primary"
occupied_color = "secondary"
empty_color = "secondary"

[widget.tray]
type = "tray"
hidden = []
pinned = ["微信", "Telegram Desktop"]
drawer = true

[widget.notifications]
type = "notifications"
hide_when_no_unread = false

[widget.battery]
type = "battery"
display_mode = "graphic"
show_label = false
hide_when_plugged = false
hide_when_full = false
device = "auto"
warning_color = "error"

[widget.volume]
type = "volume"
device = "output"
scroll_step = 5
show_label = false

[widget.brightness]
type = "brightness"
scroll_step = 5
show_label = false

[widget.control-center]
type = "control-center"
glyph = "noctalia"

[widget.clipboard]
type = "clipboard"
glyph = "clipboard"

[dock]
enabled = true
position = "bottom"
active_monitor_only = true
icon_size = 48
main_axis_padding = 16
cross_axis_padding = 8
item_spacing = 6
background_opacity = 0.85
radius = 16
margin_ends = 0
margin_edge = 8
shadow = true
show_running = true
auto_hide = true
reserve_space = false
active_scale = 1.0
inactive_scale = 0.85
magnification = true
magnification_scale = 1.45
active_opacity = 1.0
inactive_opacity = 0.85
show_dots = false
show_instance_count = true
launcher_position = "none"
launcher_icon = "grid-dots"
pinned = []
monitors = []

[desktop_widgets]
enabled = false
schema_version = 2

[desktop_widgets.grid]
visible = true
cell_size = 16
major_interval = 4

[control_center]
sidebar = "compact"
sidebar_section = "compact"

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "wallpaper"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "nightlight"

[hooks]
started = []
wallpaper_changed = []
colors_changed = []
theme_mode_changed = []
session_locked = []
session_unlocked = []
logging_out = []
rebooting = []
shutting_down = []
wifi_enabled = []
wifi_disabled = []
bluetooth_enabled = []
bluetooth_disabled = []
battery_charging = []
battery_discharging = []
battery_plugged = []
battery_percentage_changed = []
power_profile_changed = []
